name: Build and deploy Docker image to Azure Web App - smu-scorer-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: az acr login --name smuincacr

      - name: Build and push Docker image
        run: |
          docker build . -t smuincacr.azurecr.io/smu-scorer-app:${{ github.sha }} -t smuincacr.azurecr.io/smu-scorer-app:latest
          docker push smuincacr.azurecr.io/smu-scorer-app:${{ github.sha }}
          docker push smuincacr.azurecr.io/smu-scorer-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'

    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'smu-scorer-app'
          images: 'smuincacr.azurecr.io/smu-scorer-app:${{ github.sha }}'
